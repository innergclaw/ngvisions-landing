<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NGVISIONS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --black: #0a0a0a;
      --white: #ffffff;
      --gray: #888888;
    }

    body {
      font-family: 'Inter', sans-serif;
      background-color: var(--black);
      color: var(--white);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .logo {
      max-width: 500px;
      width: 100%;
      height: auto;
      filter: drop-shadow(0 0 60px rgba(255,255,255,0.15));
      animation: pulse 4s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { filter: drop-shadow(0 0 60px rgba(255,255,255,0.15)); }
      50% { filter: drop-shadow(0 0 80px rgba(255,255,255,0.25)); }
    }
  </style>
</head>
<body>

  <img src="logo.png" alt="NGVISIONS" class="logo">

</body>
</html>
